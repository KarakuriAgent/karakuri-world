services:
  world:
    build: .
    restart: unless-stopped
    environment:
      ADMIN_KEY: ${ADMIN_KEY}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      PORT: ${PORT:-3000}
      CONFIG_PATH: /app/config/${CONFIG_FILE:-example.yaml}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:3000}
      DATA_DIR: /app/data
      TZ: ${TZ:-Asia/Tokyo}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config
      - ${DATA_DIR:-./data}:/app/data
